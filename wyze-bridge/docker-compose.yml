services:
  wyze-bridge:
    image: mrlt8/wyze-bridge:2.10.3
    container_name: wyze-bridge
    restart: unless-stopped
    network_mode: host    # TUTK P2P requires host network (UDP hole-punching)
    env_file:
      - .env
    environment:
      - WB_RTSP=1
      - WB_WEBRTC=0
      - WB_HLS=0
      - WB_AUTH=False
      - TZ=America/Phoenix
      - RTSP_PORT=8559
      - MEDIAMTX_RTSPADDRESS=:8559
    volumes:
      - ./tokens:/tokens
      - ./config:/config
