services:
  wyze-bridge:
    image: mrlt8/wyze-bridge:2.10.3
    container_name: wyze-bridge
    restart: unless-stopped
    network_mode: host    # TUTK P2P requires host network (UDP hole-punching)
    env_file:
      - .env
    environment:
      - WB_RTSP=1
      - WB_WEBRTC=1
      - WB_HLS=1
      - WB_AUTH=False
      - TZ=America/Phoenix
      - RTSP_PORT=8559
      - MEDIAMTX_RTSPADDRESS=:8559
      - WB_PORT=8560
      - WB_IP=192.168.68.85
      - FLASK_RUN_PORT=8560
      - CONNECT_TIMEOUT=0
      - SNAPSHOT=API
      - ROTATE_DOOR=0
      - QUALITY=SD60
    volumes:
      - ./tokens:/tokens
      - ./config:/config
